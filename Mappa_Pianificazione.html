for(var i=0;i<isos.length;i++){var iso=isos[i];if(iso.type==="circle"&&iso.geometry&&iso.geometry.center){L.circle(iso.geometry.center,{radius:iso.geometry.radius||iso.distance,color:iso.color||"#4361ee",fillColor:iso.color||"#4361ee",fillOpacity:0.12,weight:2,dashArray:"6 4"}).addTo(map).bindPopup("<strong>"+iso.storeName+"<\/strong><br>Raggio: "+iso.distance+"m");}else if(iso.geometry&&iso.geometry.latlngs){L.polygon(iso.geometry.latlngs,{color:iso.color||"#4361ee",fillColor:iso.color||"#4361ee",fillOpacity:0.15,weight:2}).addTo(map).bindPopup("<strong>"+iso.storeName+"<\/strong><br>Isocrona: "+iso.distance+"m");}}
var mc=0;var mi=D.manualIsochrones||[];
for(var i=0;i<mi.length;i++){var iso=mi[i];var cl=iso.color||"#4361ee";if(iso.geometry&&iso.geometry.type==="circle"&&iso.geometry.center){L.circle(iso.geometry.center,{radius:iso.geometry.radius,color:cl,fillColor:cl,fillOpacity:0.15,weight:2}).addTo(map).bindPopup("<strong>"+iso.storeName+"<\/strong><br>"+(iso.storeInsegna||""));mc++;}else if(iso.geometry&&iso.geometry.latlngs){L.polygon(iso.geometry.latlngs,{color:cl,fillColor:cl,fillOpacity:0.15,weight:2}).addTo(map).bindPopup("<strong>"+iso.storeName+"<\/strong><br>"+(iso.storeInsegna||""));mc++;}}
document.getElementById("i1").textContent="PV: "+st.length;
document.getElementById("i2").textContent="Impianti: "+bb.length;
document.getElementById("i3").textContent="Isocrone: "+(isos.length+mc)+" ("+mc+" manuali)";
function hDist(a1,o1,a2,o2){var R=6371000,dL=(a2-a1)*Math.PI/180,dO=(o2-o1)*Math.PI/180,a=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(a1*Math.PI/180)*Math.cos(a2*Math.PI/180)*Math.sin(dO/2)*Math.sin(dO/2);return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
var stBBs={};for(var si=0;si<st.length;si++){stBBs[si]=[];}var unassigned=[];
for(var bi=0;bi<bb.length;bi++){var b=bb[bi];var minD=Infinity,minS=-1;for(var si=0;si<st.length;si++){var d=hDist(st[si].lat,st[si].lng,b.lat,b.lng);if(d<minD){minD=d;minS=si;}}if(minS>=0){stBBs[minS].push({bb:b,dist:Math.round(minD),idx:bi});}else{unassigned.push({bb:b,dist:0,idx:bi});}}
for(var si=0;si<st.length;si++){stBBs[si].sort(function(a,b){return a.dist-b.dist;});}
function buildSidebar(){var html="";for(var si=0;si<st.length;si++){var s=st[si];var items=stBBs[si];var col=ic[s.insegna]||"#e63946";var logoHtml=s.logo?'<img class="sp-store-logo" src="'+s.logo.replace(/"/g,"&quot;")+'" onerror="this.style.display=\'none\'">':"";html+='<div class="sp-store-group" data-store="'+s.nome.toLowerCase()+'" data-insegna="'+s.insegna.toLowerCase()+'">';html+='<div class="sp-store-header" onclick="toggleStoreGroup(this)">'+logoHtml+'<span class="sp-badge" style="background:'+col+'"><\/span><span>'+s.nome+' <small style="color:#6c757d;">('+s.insegna+")<\/small> &mdash; "+items.length+' imp.<\/span><span class="sp-arrow">&#x25B6;<\/span><\/div>';html+='<div class="sp-bb-list">';for(var j=0;j<items.length;j++){var it=items[j];var bc=DC[it.bb.dimensione]||"#4361ee";html+='<div class="sp-bb-item" onclick="flyToBB('+it.idx+')" data-search="'+((it.bb.id||"")+" "+(it.bb.dimensione||"")+" "+(it.bb.indirizzo||"")).toLowerCase()+'">';html+='<span class="sp-bb-badge" style="background:'+bc+'"><\/span>';html+='<span class="sp-bb-dim">'+it.bb.dimensione+'<\/span>';html+='<span class="sp-bb-addr">'+((it.bb.indirizzo||it.bb.id)||"-")+'<\/span>';html+='<span class="sp-bb-dist">'+it.dist+'m<\/span><\/div>';}html+='<\/div><\/div>';}document.getElementById("sp-body").innerHTML=html;document.getElementById("sp-summary").textContent=bb.length+" impianti totali, "+st.length+" punti vendita";}
buildSidebar();
var sidebarOpen=false;
function toggleSidebar(){sidebarOpen=!sidebarOpen;document.getElementById("sidebar-panel").classList.toggle("open",sidebarOpen);document.getElementById("sidebar-toggle").style.display=sidebarOpen?"none":"block";setTimeout(function(){map.invalidateSize();},350);}
function toggleStoreGroup(el){el.classList.toggle("expanded");el.nextElementSibling.classList.toggle("open");}
function flyToBB(idx){if(bbMarkers[idx]){map.flyTo(bbMarkers[idx].getLatLng(),17);bbMarkers[idx].openPopup();}}
function filterSidebarList(q){q=q.toLowerCase();var groups=document.querySelectorAll(".sp-store-group");for(var g=0;g<groups.length;g++){var grp=groups[g];var sName=grp.getAttribute("data-store")||"";var sIns=grp.getAttribute("data-insegna")||"";var items=grp.querySelectorAll(".sp-bb-item");var visCount=0;for(var i=0;i<items.length;i++){var txt=items[i].getAttribute("data-search")||"";var vis=!q||txt.indexOf(q)>=0||sName.indexOf(q)>=0||sIns.indexOf(q)>=0;items[i].style.display=vis?"":"none";if(vis)visCount++;}grp.style.display=(!q||visCount>0||sName.indexOf(q)>=0||sIns.indexOf(q)>=0)?"":"none";if(q&&visCount>0){grp.querySelector(".sp-store-header").classList.add("expanded");grp.querySelector(".sp-bb-list").classList.add("open");}else if(!q){grp.querySelector(".sp-store-header").classList.remove("expanded");grp.querySelector(".sp-bb-list").classList.remove("open");}}}
</script></body></html>
